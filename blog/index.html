<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Pairlot</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230D2545'/%3E%3Ctext x='16' y='23' font-family='Arial Black, Arial, sans-serif' font-weight='900' font-size='14' fill='%234A9AFF' text-anchor='middle'%3EPL%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:       #0D2545;
    --navy-deep:  #091A30;
    --navy-mid:   #142E55;
    --navy-light: #1E3F6F;
    --accent:     #2A7DE1;
    --accent-bright: #4A9AFF;
    --accent-glow:   rgba(42,125,225,0.18);
    --gold:       #E8A93A;
    --white:      #FFFFFF;
    --off-white:  #F0F4FA;
    --muted:      rgba(255,255,255,0.55);
    --border:     rgba(255,255,255,0.1);
    --border-accent: rgba(42,125,225,0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy-deep);
    color: var(--white);
    overflow-x: hidden;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 4rem;
    background: rgba(9,26,48,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
  }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.4rem; letter-spacing: -0.02em;
    color: var(--white); text-decoration: none;
  }
  .nav-logo span { color: var(--accent-bright); }
  .nav-cta {
    font-size: 0.875rem; font-weight: 500;
    background: var(--accent); color: var(--white);
    padding: 0.55rem 1.4rem; border-radius: 6px;
    text-decoration: none; transition: background 0.2s;
    letter-spacing: 0.02em;
  }
  .nav-cta:hover { background: var(--accent-bright); }

  /* ── PAGE HEADER ── */
  .page-header {
    padding: 140px 64px 64px;
    max-width: 1200px; margin: 0 auto;
    position: relative;
  }
  .page-header::before {
    content: '';
    position: absolute; top: 80px; left: 0; right: 0; height: 300px;
    background: radial-gradient(ellipse 60% 50% at 30% 40%, rgba(42,125,225,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(42,125,225,0.12); border: 1px solid var(--border-accent);
    border-radius: 100px; padding: 0.35rem 1rem;
    font-size: 0.75rem; font-weight: 500; color: var(--accent-bright);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 24px;
  }
  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-bright); animation: blink 2s ease infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
  }

  .page-header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(36px, 5vw, 60px);
    line-height: 1.08; letter-spacing: -0.03em;
    max-width: 640px; margin-bottom: 20px;
    color: var(--white);
  }
  .page-header h1 span { color: var(--accent-bright); }

  .page-header p {
    font-size: 17px; font-weight: 300;
    color: var(--muted); max-width: 500px;
    line-height: 1.65;
  }

  /* ── BLOG GRID ── */
  .blog-section {
    padding: 0 64px 96px;
    max-width: 1200px; margin: 0 auto;
  }

  .blog-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .blog-grid .post-card:first-child {
    grid-column: span 2;
  }

  /* ── POST CARD ── */
  .post-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: flex; flex-direction: column;
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease, border-color 0.2s, box-shadow 0.2s;
  }
  .post-card:hover {
    border-color: var(--border-accent);
    box-shadow: 0 8px 40px rgba(42,125,225,0.12);
    transform: translateY(-3px) !important;
  }

  .post-card-image {
    width: 100%; aspect-ratio: 16/9;
    overflow: hidden; position: relative;
  }
  .post-card-image img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.4s ease;
  }
  .post-card:hover .post-card-image img { transform: scale(1.03); }

  .post-card-image-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, rgba(42,125,225,0.15) 0%, rgba(9,26,48,0.8) 100%);
  }
  .post-card-image-placeholder svg { opacity: 0.25; }

  .post-card-body {
    padding: 24px 28px 28px;
    flex: 1; display: flex; flex-direction: column;
  }

  .post-meta {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px;
  }
  .post-date {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent-bright); opacity: 0.7;
  }
  .post-author {
    font-size: 11px; color: var(--muted);
  }
  .post-author::before { content: '·'; margin-right: 12px; opacity: 0.4; }

  .post-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(17px, 2vw, 22px);
    line-height: 1.25; letter-spacing: -0.02em;
    margin-bottom: 10px; color: var(--white);
  }
  .blog-grid .post-card:first-child .post-title {
    font-size: clamp(20px, 2.5vw, 28px);
  }

  .post-summary {
    font-size: 13px; font-weight: 300;
    color: var(--muted); line-height: 1.65;
    flex: 1; margin-bottom: 18px;
  }

  .post-readmore {
    font-size: 12px; font-weight: 500;
    color: var(--accent-bright);
    display: inline-flex; align-items: center; gap: 6px;
    letter-spacing: 0.04em; text-transform: uppercase;
    transition: gap 0.2s;
  }
  .post-card:hover .post-readmore { gap: 10px; }
  .post-readmore::after { content: '→'; }

  /* ── EMPTY / LOADING ── */
  .empty-state {
    text-align: center; padding: 96px 48px;
    color: var(--muted);
  }
  .empty-state h2 {
    font-family: 'Syne', sans-serif;
    font-size: 28px; margin-bottom: 12px; color: var(--white);
  }

  .loading-state { text-align: center; padding: 96px 48px; }
  .loading-dots { display: inline-flex; gap: 8px; align-items: center; }
  .loading-dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-bright); opacity: 0.3;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* ── FOOTER ── */
  footer {
    background: var(--navy-deep);
    border-top: 1px solid var(--border);
    padding: 40px 64px;
    font-size: 13px; color: var(--muted);
    display: flex; align-items: center; justify-content: space-between;
  }
  footer a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
  footer a:hover { color: var(--white); }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    nav { padding: 1rem 1.5rem; }
    .page-header { padding: 120px 24px 48px; }
    .blog-section { padding: 0 24px 64px; }
    .blog-grid { grid-template-columns: 1fr; }
    .blog-grid .post-card:first-child { grid-column: span 1; }
    footer { flex-direction: column; gap: 12px; text-align: center; padding: 32px 24px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">Pair<span>lot</span></a>
  <a href="/#founding" class="nav-cta">Reserve Your Spot</a>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="header-badge"><span class="badge-dot"></span>Insights &amp; Intelligence</div>
  <h1>The Partner<br><span>Intelligence</span> Blog</h1>
  <p>Research, thinking, and field notes on ISV partner discovery, ecosystem-led growth, and channel intelligence.</p>
</div>

<!-- BLOG GRID -->
<div class="blog-section">
  <div id="blogContainer">
    <div class="loading-state">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <span>© 2026 Pairlot by Globus Edge. All rights reserved.</span>
  <a href="/">← Back to main site</a>
</footer>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }

  function parseFrontMatter(text) {
    const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
    if (!match) return { data: {}, content: text };
    const data = {};
    const lines = match[1].split('\n');
    let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      const colonIdx = line.indexOf(':');
      if (colonIdx === -1) { i++; continue; }
      const key = line.slice(0, colonIdx).trim();
      const rest = line.slice(colonIdx + 1).trim();
      if (rest === '>-' || rest === '|-' || rest === '>' || rest === '|') {
        let block = [];
        i++;
        while (i < lines.length && (lines[i].startsWith(' ') || lines[i].startsWith('\t'))) {
          block.push(lines[i].trim());
          i++;
        }
        data[key] = block.join(' ');
      } else {
        data[key] = rest.replace(/^["']|["']$/g, '');
        i++;
      }
    }
    return { data, content: match[2].trim() };
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  const GITHUB_USER = 'globusedge';
  const GITHUB_REPO = 'pairlot-site';
  const POSTS_PATH = 'blog/posts';

  async function loadPosts() {
    const container = document.getElementById('blogContainer');
    try {
      const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${POSTS_PATH}`);
      if (!res.ok) throw new Error('Could not fetch posts');
      const files = await res.json();
      const mdFiles = files.filter(f => f.name.endsWith('.md')).reverse();

      if (mdFiles.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h2>No posts yet</h2>
            <p>Check back soon — articles are on their way.</p>
          </div>`;
        return;
      }

      const posts = await Promise.all(mdFiles.map(async (file) => {
        const r = await fetch(file.download_url);
        const text = await r.text();
        const { data } = parseFrontMatter(text);
        return {
          slug: file.name.replace('.md', ''),
          title: data.title || 'Untitled',
          date: data.date || '',
          author: data.author || 'Pairlot',
          summary: data.summary || '',
          thumbnail: data.thumbnail || '',
        };
      }));

      const grid = document.createElement('div');
      grid.className = 'blog-grid';

      posts.forEach((post) => {
        const card = document.createElement('a');
        card.className = 'post-card';
        card.href = `/blog/post.html?slug=${post.slug}`;

        const imgHtml = post.thumbnail
          ? `<div class="post-card-image"><img src="${post.thumbnail}" alt="${post.title}" loading="lazy"></div>`
          : `<div class="post-card-image">
               <div class="post-card-image-placeholder">
                 <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                   <rect x="4" y="10" width="40" height="28" rx="3" stroke="#4A9AFF" stroke-width="2"/>
                   <circle cx="17" cy="21" r="4" stroke="#4A9AFF" stroke-width="2"/>
                   <path d="M4 32l10-8 8 6 8-10 14 12" stroke="#4A9AFF" stroke-width="2" stroke-linejoin="round"/>
                 </svg>
               </div>
             </div>`;

        card.innerHTML = `
          ${imgHtml}
          <div class="post-card-body">
            <div class="post-meta">
              <span class="post-date">${formatDate(post.date)}</span>
              <span class="post-author">${post.author}</span>
            </div>
            <h2 class="post-title">${post.title}</h2>
            ${post.summary ? `<p class="post-summary">${post.summary}</p>` : ''}
            <span class="post-readmore">Read article</span>
          </div>`;

        grid.appendChild(card);
      });

      container.innerHTML = '';
      container.appendChild(grid);

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'translateY(0)';
          }
        });
      }, { threshold: 0.05 });

      document.querySelectorAll('.post-card').forEach((el, i) => {
        el.style.transitionDelay = `${i * 0.08}s`;
        observer.observe(el);
      });

    } catch (err) {
      container.innerHTML = `
        <div class="empty-state">
          <h2>Could not load posts</h2>
          <p>Please try refreshing the page.</p>
        </div>`;
      console.error(err);
    }
  }

  loadPosts();
</script>
</body>
</html>
